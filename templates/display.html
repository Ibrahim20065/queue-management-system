<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Display</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="display-body">

    <div class="display-wrapper">

        <!-- Header -->
        <div class="display-header">
            <h1>🏦 Client Service Queue</h1>
            <p id="display-time"></p>
        </div>

        <!-- Counters Grid -->
        <div id="display-counters" class="display-counters-grid">
            <p class="display-empty" style="color:#475569">No active counters</p>
        </div>

        <!-- Footer -->
        <div class="display-footer">
            <p>Please take a number from the customer terminal and wait to be called</p>
        </div>

    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('display-time').textContent =
                now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function loadDisplay() {
            fetch('/api/display')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('display-counters');

                    if (!data || data.length === 0) {
                        container.innerHTML = '<p class="display-empty" style="color:#475569;grid-column:1/-1">No active counters</p>';
                        return;
                    }

                    container.innerHTML = data.map(counter => `
                        <div class="display-counter-card">
                            <div class="display-counter-header">
                                <span class="display-counter-name">${counter.name}</span>
                                <span class="display-counter-waiting">${counter.waiting_count} waiting</span>
                            </div>

                            <div class="display-counter-serving">
                                <p class="display-label">Now Serving</p>
                                <div class="display-ticket-sm">${counter.current_serving || '--'}</div>
                                ${counter.serving ? `
                                <p class="display-serving-name">${counter.serving.customer_name}</p>
                                <p class="display-serving-service">${counter.serving.service}</p>
                                ` : '<p class="display-serving-name" style="color:#475569">No one being served</p>'}
                            </div>

                            <div class="display-counter-next">
                                <p class="display-label">Up Next</p>
                                ${counter.next_customers.length > 0
                                    ? counter.next_customers.map(c => `
                                        <div class="display-next-item">
                                            <span class="display-next-ticket">#${c.ticket_number}</span>
                                            <span class="display-next-name">${c.customer_name}</span>
                                            <span class="display-next-service">${c.service}</span>
                                        </div>`).join('')
                                    : '<p class="display-empty">No customers waiting</p>'
                                }
                            </div>
                        </div>
                    `).join('');
                })
                .catch(() => {});
        }

        updateTime();
        setInterval(updateTime, 1000);
        loadDisplay();
        setInterval(loadDisplay, 5000);
    </script>

</body>
</html>
