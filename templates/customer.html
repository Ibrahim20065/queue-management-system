<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>Queue Management</h1>
            <p>Fill in your details and join the queue</p>
        </div>

        <!-- QR Code -->
        <div class="card qr-card">
            <h2>Scan to Join</h2>
            <p>Scan this QR code on your phone to join the queue</p>
            <div id="qrcode"></div>
        </div>

        <!-- Join Section -->
        <div id="join-section" class="card">
            <h2>Join the Queue</h2>

            <div class="form-group">
                <label for="customer-name">Your Name</label>
                <input type="text" id="customer-name" placeholder="Enter your full name" />
            </div>

            <div class="form-group">
                <label for="service-select">Service Required</label>
                <select id="service-select">
                    <option value="">Loading services...</option>
                </select>
            </div>

            <button id="join-btn" onclick="joinQueue()">Join Queue</button>
            <p id="error-msg" class="error hidden"></p>
        </div>

        <!-- Ticket Section -->
        <div id="ticket-section" class="card hidden">
            <h2>Your Ticket</h2>
            <div class="ticket-number" id="ticket-display">--</div>

            <div class="ticket-info">
                <p id="customer-name-display"></p>
                <p id="service-display"></p>
            </div>

            <div class="status-box">
                <div class="stat">
                    <span class="stat-label">Your position</span>
                    <span class="stat-value" id="position-display">--</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Now serving</span>
                    <span class="stat-value" id="serving-display">--</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Est. wait</span>
                    <span class="stat-value" id="wait-display">--</span>
                </div>
            </div>

            <p id="status-msg" class="status-msg"></p>
            <p class="refresh-note">Position updates automatically every 5 seconds</p>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        window.addEventListener('load', function() {
            new QRCode(document.getElementById("qrcode"), {
                text: window.location.href,
                width: 160,
                height: 160,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        });
    </script>
</body>
</html>
