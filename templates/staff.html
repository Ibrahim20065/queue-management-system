<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container staff-container">

        <div class="header">
            <h1>Staff Dashboard</h1>
            <p>Manage the queue from here</p>
        </div>

        <!-- Create Queue Card -->
        <div class="card" id="create-queue-card">
            <h2>Create New Queue</h2>

            <div class="form-group">
                <label for="queue-name">Queue Name</label>
                <input type="text" id="queue-name" placeholder="e.g. Main Counter, Branch A" value="Main Queue" />
            </div>

            <div class="form-group">
                <label>Services Offered</label>
                <div id="services-list">
                    <div class="service-item">
                        <input type="text" placeholder="e.g. Account Opening" class="service-input" />
                        <button class="remove-service-btn" onclick="removeService(this)">✕</button>
                    </div>
                </div>
                <button class="add-service-btn" onclick="addService()">+ Add Service</button>
            </div>

            <button onclick="createQueue()">Start Queue</button>
            <p id="control-msg" class="control-msg hidden"></p>
        </div>

        <!-- Queue Controls -->
        <div class="card" id="queue-controls-card">
            <h2 id="queue-name-display">Queue</h2>
            <div class="controls-grid">
                <button onclick="callNext()" class="btn-success">Call Next</button>
                <button onclick="closeQueue()" class="btn-danger">Close Queue</button>
            </div>
        </div>

        <!-- Now Serving -->
        <div class="card">
            <h2>Now Serving</h2>
            <div class="ticket-number" id="serving-display">--</div>
            <div id="serving-details" class="serving-details hidden">
                <p id="serving-name"></p>
                <p id="serving-service"></p>
            </div>
        </div>

        <!-- Queue List -->
        <div class="card">
            <h2>Queue List</h2>
            <div id="queue-list">
                <p class="empty-msg">No active queue</p>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/staff.js') }}"></script>
</body>
</html>
