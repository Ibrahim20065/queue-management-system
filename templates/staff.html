<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container staff-container">

        <div class="header">
            <h1>Staff Dashboard</h1>
            <p>Manage your counters from here</p>
        </div>

        <!-- Analytics -->
        <div class="analytics-grid">
            <div class="stat-card">
                <span class="stat-card-label">Served Today</span>
                <span class="stat-card-value" id="stat-served">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-card-label">Waiting</span>
                <span class="stat-card-value" id="stat-waiting">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-card-label">Popular Service</span>
                <span class="stat-card-value small" id="stat-popular">N/A</span>
            </div>
            <div class="stat-card">
                <span class="stat-card-label">Active Counters</span>
                <span class="stat-card-value" id="stat-counters">0</span>
            </div>
        </div>

        <!-- Create Counter -->
        <div class="card">
            <h2>Open New Counter</h2>
            <div class="form-group">
                <label for="counter-name">Counter Name</label>
                <select id="counter-name">
                    <option value="">Select a counter...</option>
                    <option value="Counter 1 — General Services">Counter 1 — General Services</option>
                    <option value="Counter 2 — Loans & Mortgages">Counter 2 — Loans & Mortgages</option>
                    <option value="Counter 3 — Cards & Payments">Counter 3 — Cards & Payments</option>
                    <option value="Counter 4 — Account Management">Counter 4 — Account Management</option>
                    <option value="Counter 5 — Customer Support">Counter 5 — Customer Support</option>
                    <option value="VIP Counter">VIP Counter</option>
                </select>
            </div>
            <div class="form-group">
                <label for="counter-services">Services Offered</label>
                <select id="counter-services" multiple size="6">
                    <option value="Account Opening">Account Opening</option>
                    <option value="Account Closure">Account Closure</option>
                    <option value="Loan Application">Loan Application</option>
                    <option value="Loan Consultation">Loan Consultation</option>
                    <option value="Mortgage Inquiry">Mortgage Inquiry</option>
                    <option value="Credit Card Application">Credit Card Application</option>
                    <option value="Debit Card Services">Debit Card Services</option>
                    <option value="Card Replacement">Card Replacement</option>
                    <option value="Fund Transfer">Fund Transfer</option>
                    <option value="Fixed Deposit">Fixed Deposit</option>
                    <option value="Internet Banking Setup">Internet Banking Setup</option>
                    <option value="General Inquiry">General Inquiry</option>
                </select>
                <p class="select-hint">Hold Ctrl (Windows) or Cmd (Mac) to select multiple services</p>
            </div>
            <button onclick="createCounter()">Open Counter</button>
            <p id="control-msg" class="control-msg hidden"></p>
        </div>

        <!-- Active Counters -->
        <div class="card">
            <h2>Active Counters</h2>
            <div id="counters-container">
                <p class="empty-msg">No active counters — create one above</p>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/staff.js') }}"></script>
</body>
</html>
